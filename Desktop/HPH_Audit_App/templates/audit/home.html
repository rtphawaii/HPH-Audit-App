<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HPH Audit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --surface2: #1e2330;
      --border: #2a2f3d;
      --accent: #4f7fff;
      --accent-glow: rgba(79, 127, 255, 0.25);
      --accent-hover: #6b93ff;
      --success: #34d399;
      --success-bg: rgba(52, 211, 153, 0.1);
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.1);
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { display: block; }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--accent); }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      position: relative;
      outline: none;
    }

    .drop-zone:hover,
    .drop-zone.dragging {
      border-color: var(--accent);
      background: rgba(79, 127, 255, 0.04);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .drop-zone.has-file {
      border-style: solid;
      border-color: var(--accent);
      background: rgba(79, 127, 255, 0.06);
    }

    .drop-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      background: var(--surface2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }

    .drop-zone:hover .drop-icon,
    .drop-zone.dragging .drop-icon {
      background: var(--accent-glow);
    }

    .drop-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-hint {
      font-size: 12px;
      color: var(--muted);
    }

    .drop-hint b { color: var(--accent); font-weight: 600; }

    #file-input { display: none; }

    /* File preview chip */
    .file-chip {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 14px;
      font-size: 13px;
      animation: fadeIn 200ms ease;
    }

    .file-chip.visible { display: flex; }

    .file-chip-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-weight: 500;
    }

    .file-chip-size { color: var(--muted); white-space: nowrap; }

    .file-chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 2px;
      border-radius: 4px;
      display: flex;
      transition: color var(--transition);
    }

    .file-chip-remove:hover { color: var(--error); }

    /* Submit button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      margin-top: 20px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      letter-spacing: 0.1px;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 8px 24px rgba(79, 127, 255, 0.35);
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Progress bar */
    .progress-wrap {
      display: none;
      margin-top: 16px;
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      border-radius: 99px;
      width: 0%;
      transition: width 300ms ease;
    }

    .progress-bar.indeterminate {
      width: 40%;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Result banner */
    .result {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      animation: fadeIn 200ms ease;
    }

    .result.visible { display: flex; align-items: flex-start; gap: 10px; }

    .result.success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
    .result.error   { background: var(--error-bg);   color: var(--error);   border: 1px solid rgba(248,113,113,0.2); }

    .result-icon { flex-shrink: 0; margin-top: 1px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Spinner in button */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <span class="logo-text">HPH <span>Audit</span></span>
  </div>

  <h1>Upload Audit File</h1>
  <p class="subtitle">Upload your Excel spreadsheet to run the audit processing pipeline.</p>

  <form id="upload-form" method="post" enctype="multipart/form-data" action="{% url 'upload_file' %}">
    {% csrf_token %}

    <div class="drop-zone" id="drop-zone" tabindex="0" role="button" aria-label="Upload Excel file">
      <div class="drop-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4f7fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
      </div>
      <p class="drop-label">Drag &amp; drop your file here</p>
      <p class="drop-hint">or <b>click to browse</b> &mdash; .xlsx, .xls, .xlsm up to 50 MB</p>
      <input type="file" id="file-input" name="file" accept=".xlsx,.xls,.xlsm" />
    </div>

    <div class="file-chip" id="file-chip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4f7fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="file-chip-name" id="chip-name"></span>
      <span class="file-chip-size" id="chip-size"></span>
      <button type="button" class="file-chip-remove" id="remove-file" aria-label="Remove file">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <button class="btn" id="submit-btn" type="submit" disabled>
      <div class="spinner" id="spinner"></div>
      <svg id="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span id="btn-label">Run Audit</span>
    </button>
  </form>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar indeterminate" id="progress-bar"></div>
  </div>

  <div class="result" id="result">
    <span class="result-icon" id="result-icon"></span>
    <span id="result-msg"></span>
  </div>
</div>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const fileChip   = document.getElementById('file-chip');
  const chipName   = document.getElementById('chip-name');
  const chipSize   = document.getElementById('chip-size');
  const removeBtn  = document.getElementById('remove-file');
  const submitBtn  = document.getElementById('submit-btn');
  const form       = document.getElementById('upload-form');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar  = document.getElementById('progress-bar');
  const result     = document.getElementById('result');
  const resultMsg  = document.getElementById('result-msg');
  const resultIcon = document.getElementById('result-icon');
  const spinner    = document.getElementById('spinner');
  const btnIcon    = document.getElementById('btn-icon');
  const btnLabel   = document.getElementById('btn-label');

  let selectedFile = null;

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 ** 2) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 ** 2).toFixed(1) + ' MB';
  }

  function setFile(file) {
    selectedFile = file;
    chipName.textContent = file.name;
    chipSize.textContent = formatBytes(file.size);
    fileChip.classList.add('visible');
    dropZone.classList.add('has-file');
    submitBtn.disabled = false;
    hideResult();
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    fileChip.classList.remove('visible');
    dropZone.classList.remove('has-file');
    submitBtn.disabled = true;
    hideResult();
  }

  function showResult(type, msg) {
    result.className = 'result visible ' + type;
    resultMsg.textContent = msg;
    resultIcon.innerHTML = type === 'success'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  }

  function hideResult() { result.className = 'result'; }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    spinner.style.display = loading ? 'block' : 'none';
    btnIcon.style.display = loading ? 'none' : 'block';
    btnLabel.textContent = loading ? 'Processing...' : 'Run Audit';
    progressWrap.classList.toggle('visible', loading);
  }

  // Drop zone click
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', e => { e.stopPropagation(); clearFile(); });

  // Drag & drop
  ['dragenter', 'dragover'].forEach(ev => {
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  });
  ['dragleave', 'drop'].forEach(ev => {
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragging'); });
  });
  dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['xlsx','xls','xlsm'].includes(ext)) {
        showResult('error', 'Please drop an Excel file (.xlsx, .xls, .xlsm).');
        return;
      }
      fileInput.files = e.dataTransfer.files;
      setFile(file);
    }
  });

  // Form submit via fetch (no page reload)
  form.addEventListener('submit', async e => {
    e.preventDefault();
    if (!selectedFile) return;

    setLoading(true);
    hideResult();

    const data = new FormData(form);

    try {
      const res = await fetch(form.action, { method: 'POST', body: data });
      const json = await res.json();
      showResult(json.status === 'success' ? 'success' : 'error', json.message);
      if (json.status === 'success') clearFile();
    } catch {
      showResult('error', 'Network error — please try again.');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
